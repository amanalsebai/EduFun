name: edufun
description: "تطبيق تعليمي تفاعلي للأطفال (فلاتر + PHP + MySQL)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  url_launcher: ^6.2.5
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:

  uses-material-design: true

  assets:
    - assets/images/

# إعدادات أيقونة التطبيق المخصصة
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/ico.jpg"
